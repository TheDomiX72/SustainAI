<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SustainLEX.AI | Powered by Tecno Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --tecno-blue: #002b49; --tecno-light: #00a0d2; --bg-main: #f8fafc; --text-main: #1e293b;
            --text-muted: #64748b; --border-color: #e2e8f0;
            
            /* Status */
            --status-alta: #ef4444; --status-alta-bg: #fee2e2;
            --status-media: #f59e0b; --status-media-bg: #fef3c7;
            --status-bassa: #10b981; --status-bassa-bg: #d1fae5;
            --vigente-bg: #f0fdf4; --vigente-text: #16a34a; --vigente-border: #bbf7d0;
            --attiva-bg: #fffbeb; --attiva-text: #d97706; --attiva-border: #fde68a;
        }
        
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background-color: var(--bg-main); margin: 0; padding: 20px; }
        .header-logo { text-align: center; margin-bottom: 30px; }
        .header-logo img { max-height: 55px; width: auto; }

        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); box-sizing: border-box;}
        
        h1, h2, h3 { color: var(--tecno-blue); margin-top: 0; }
        h1 { font-weight: 700; border-bottom: 3px solid var(--tecno-light); display: inline-block; padding-bottom: 5px; }
        p { color: var(--text-muted); line-height: 1.6; }
        
        .section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .form-group { margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--tecno-light); }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: var(--tecno-blue); line-height: 1.4; }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #dcdcdc; border-radius: 6px; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: var(--tecno-light); }
        .conditional-select { display: none; margin-top: 15px; border-left: 3px solid var(--tecno-blue); padding-left: 15px; background: white; }
        
        button { background-color: var(--tecno-blue); color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 20px; }
        button:hover { background-color: var(--tecno-light); }
        
        /* REPORT STYLES */
        #reportSection { display: none; width: 100%; box-sizing: border-box; }
        #printableReport { background: white; width: 100%; box-sizing: border-box; max-width: 100%; position: relative; }
        
        .avoid-break { page-break-inside: avoid; break-inside: avoid; clear: both;}
        .page-break { page-break-before: always; clear: both; padding-top: 20px; margin-top: 20px; }

        /* Ambiti */
        .ambiti-flex-container { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; box-sizing: border-box; }
        .ambito-card { flex: 1; min-width: calc(50% - 10px); box-sizing: border-box; margin-bottom: 10px; page-break-inside: avoid; break-inside: avoid;}
        .ambito-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; }
        .ambito-title { display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .ambito-dot { width: 10px; height: 10px; border-radius: 50%; }
        .ambito-score { color: var(--text-muted); font-size: 13px; }
        .progress-bg { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 10px; width: 100%; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .norm-pills-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .norm-pill { font-size: 11px; padding: 3px 9px; border-radius: 10px; border: 1px solid var(--border-color); color: var(--text-muted); background: white; white-space: nowrap;}

        /* Accordion Obblighi Normativi Applicabili */
        .obbligo-card { border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 10px; background: white; overflow: hidden; transition: border-color 0.2s; width: 100%; box-sizing: border-box;}
        .obbligo-card.open { border-color: var(--text-muted); }
        .obbligo-header { display: flex; align-items: center; justify-content: space-between; padding: 14px; cursor: pointer; user-select: none; gap: 10px; }
        .obbligo-header:hover { background: #fafafa; }
        .obbligo-info { flex: 1; min-width: 0; }
        .obbligo-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; color: var(--text-main); display: flex; align-items: center; gap: 6px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .obbligo-subtitle { font-size: 12px; color: var(--text-muted); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .obbligo-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .chevron { transition: transform 0.3s; margin-left: 5px; color: var(--text-muted); flex-shrink: 0;}
        .obbligo-card.open .chevron { transform: rotate(180deg); }
        
        /* Contenuto Espanso */
        .obbligo-details { display: none; padding: 0 16px 16px 16px; border-top: 1px solid var(--border-color); background: #fafafa; box-sizing: border-box;}
        .obbligo-desc { font-size: 13px; color: var(--text-main); margin: 12px 0; line-height: 1.5; }
        .scadenze-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .scadenza-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin-bottom: 6px; color: var(--text-muted); }
        .scadenza-date { font-weight: 600; color: var(--text-main); min-width: 120px; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap;}
        
        /* Dot Meters */
        .meter-group { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0;}
        .meter-label { font-size: 10px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }
        .dots { display: flex; gap: 2px; }
        .dot { width: 12px; height: 5px; border-radius: 2px; background-color: #e2e8f0; }
        .dot.fill-alta { background-color: var(--status-alta); }
        .dot.fill-media { background-color: var(--status-media); }
        .dot.fill-bassa { background-color: var(--status-bassa); }

        /* Database Normativo */
        .db-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px; }
        .db-stats { display: flex; gap: 8px; }
        .db-stat-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .db-stat-vigente { background: var(--vigente-bg); color: var(--vigente-text); border: 1px solid var(--vigente-border); }
        .db-stat-attiva { background: var(--attiva-bg); color: var(--attiva-text); border: 1px solid var(--attiva-border); }
        .db-row { padding: 14px 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; width: 100%; box-sizing: border-box;}
        .db-icon { margin-top: 2px; flex-shrink: 0;}
        .db-content { flex: 1; min-width: 0; }
        .db-content h4 { margin: 0 0 3px 0; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 8px; flex-wrap: wrap;}
        .db-content p { margin: 0; font-size: 12px; color: var(--text-muted); line-height: 1.5;}
        .db-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; white-space: nowrap;}
        
        .chart-container { position: relative; height: 480px; width: 100%; margin-top: 20px; background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; box-sizing: border-box; max-width: 100%;}
        
        /* Nota Legale */
        .legal-disclaimer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 10px; color: var(--text-muted); text-align: justify; line-height: 1.5; }

        /* FIX PDF LANDSCAPE (Completamente Riscritto per html2pdf) */
        .pdf-mode {
            /* 1046px corrisponde all'A4 orizzontale (297mm) meno i 10mm di margine per lato a 96dpi */
            width: 1046px !important;
            max-width: 1046px !important;
            padding: 0 !important;
            background: white !important;
            box-sizing: border-box !important;
            position: relative;
        }
        
        .pdf-mode .obbligo-details { display: block !important; }
        .pdf-mode .chevron { display: none !important; }
        
        /* Disabilitiamo Flexbox che causa il collasso delle pagine in jsPDF */
        .pdf-mode .ambiti-flex-container { display: block !important; width: 100% !important; }
        .pdf-mode .ambito-card { width: 48% !important; display: inline-block !important; vertical-align: top !important; margin-right: 1.5% !important; margin-bottom: 15px !important; }
        
        /* Forziamo i blocchi per evitare tagli a metà */
        .pdf-mode .obbligo-card { display: block !important; width: 100% !important; page-break-inside: avoid !important; break-inside: avoid !important; margin-bottom: 15px !important;}
        .pdf-mode .avoid-break { page-break-inside: avoid !important; break-inside: avoid !important; display: block !important; }
        
        /* Dimensioni costanti per la Matrice nel PDF */
        .pdf-mode .chart-container { height: 500px !important; width: 100% !important; page-break-inside: avoid !important; }

        @media print {
            body { padding: 0; background: white; }
            .header-logo, .container, #reportSection { box-shadow: none; border-radius: 0; width: 297mm; max-width: 297mm; margin: 0 auto; padding: 10mm; }
        }
    </style>
</head>
<body>

<div class="header-logo">
    <img src="Tecno ESG.png" alt="Tecno Group Logo" id="mainLogo">
</div>

<div class="container" id="appContainer">
    <div id="inputSection">
        <h1>SustainLEX.AI</h1>
        <p>Valutazione preliminare di compliance alle normative europee sulla sostenibilità ambientale e sociale.</p>

        <div class="section">
            <h2>1. Anagrafica Aziendale</h2>
            <div class="form-group"><label>Nome azienda</label><input type="text" id="companyName"></div>
            <div class="form-group"><label>P.Iva</label><input type="text" id="vat"></div>
            <div class="form-group"><label>Indirizzo sito web</label><input type="text" id="website"></div>
            
            <div class="form-group">
                <label>Settore (Selezione multipla - tieni premuto Ctrl/Cmd)</label>
                <select id="sector" multiple size="8" onchange="toggleSectorOther()">
                    <option value="prodotti agricoli e alimentari" selected>prodotti agricoli e alimentari</option>
                    <option value="prodotti chimici">prodotti chimici</option>
                    <option value="Materie plastiche e gomma">Materie plastiche e gomma</option>
                    <option value="prodotti tessili">prodotti tessili</option>
                    <option value="metalli e prodotti metallici">metalli e prodotti metallici</option>
                    <option value="macchinari e apparecchiature">macchinari e apparecchiature</option>
                    <option value="minerali e combustibili">minerali e combustibili</option>
                    <option value="legno e prodotti in legno">legno e prodotti in legno</option>
                    <option value="articoli in pelle e calzature">articoli in pelle e calzature</option>
                    <option value="prodotti minerali e materiali da costruzione">prodotti minerali e materiali da costruzione</option>
                    <option value="prodotti farmaceutici">prodotti farmaceutici</option>
                    <option value="prodotti cosmetici">prodotti cosmetici</option>
                    <option value="veicoli e mezzi di trasporto">veicoli e mezzi di trasporto</option>
                    <option value="apparecchiature elettroniche ed elettrodomestici">apparecchiature elettroniche ed elettrodomestici</option>
                    <option value="prodotti dell'industria cartaria">prodotti dell'industria cartaria</option>
                    <option value="servizi">servizi</option>
                    <option value="Altro">altro da specificare</option>
                </select>
                <input type="text" id="sectorOther" maxlength="30" class="conditional-select" placeholder="Specifica settore (max 30 caratteri)">
            </div>
            <div class="form-group"><label>Numero dipendenti</label><input type="number" id="employees" value="250"></div>
            <div class="form-group"><label>Fatturato Annuale (€)</label><input type="number" id="revenue" value="50000000"></div>
        </div>

        <div class="section">
            <h2>2. Questionario Operativo</h2>
            
            <div class="form-group">
                <label>1. L'azienda redige un report di sostenibilità?</label>
                <select id="q1" onchange="toggleConditional('q1', 'q1_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q1_sub" class="conditional-select">
                    <option value="">Seleziona...</option>
                    <option value="GRI">Report di sostenibilità GRI?</option>
                    <option value="ESRS">Report di sostenibilità ESRS?</option>
                    <option value="Altro">Altro tipo di Report di sostenibilità (es: VSME).</option>
                </select>
            </div>

            <div class="form-group">
                <label>2. Tra i clienti dell'azienda ci sono grandi aziende o multinazionali?</label>
                <select id="q2" onchange="toggleConditional('q2', 'q2_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q2_sub" class="conditional-select">
                    <option value="">Seleziona...</option>
                    <option value="Collab">L'azienda collabora pienamente ai processi di due diligence ambientale e sociale di tali clienti</option>
                    <option value="Dati">L'azienda fornisce a tali clienti molti e diversi dati in materia di sostenibilità ambientale e sociale</option>
                    <option value="Nessuna">I clienti non richiedono dati al momento.</option>
                </select>
            </div>

            <div class="form-group">
                <label>3. L'azienda verifica periodicamente i propri processi per garantire l'assenza di lavoro forzato e o minorile
