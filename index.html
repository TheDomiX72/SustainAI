<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SustainLEX.AI | Powered by Tecno Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --tecno-blue: #002b49;
            --tecno-light-blue: #00a0d2;
            --bg-light: #f4f7f6;
            --active-norm: #e6f4ea; 
            --active-border: #34a853;
            --upcoming-norm: #fef7e0;
            --upcoming-border: #fbbc04;
            --text-main: #333333;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
        }

        .header-logo { text-align: center; margin-bottom: 30px; }
        .header-logo img { max-height: 55px; width: auto; }

        .container {
            max-width: 1200px; margin: auto; background: white;
            padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1, h2, h3 { color: var(--tecno-blue); }
        h1 { font-weight: 700; border-bottom: 3px solid var(--tecno-light-blue); display: inline-block; padding-bottom: 5px; }
        
        .section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eaeaea; }
        .form-group { margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--tecno-light-blue); }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: var(--tecno-blue); }
        
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px; border: 1px solid #dcdcdc; border-radius: 6px; box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; font-size: 14px;
        }

        input:focus, select:focus { outline: none; border-color: var(--tecno-light-blue); }
        .conditional-select { display: none; margin-top: 15px; border-left: 3px solid var(--tecno-blue); padding-left: 15px; background: white; }
        
        button {
            background-color: var(--tecno-blue); color: white; padding: 15px 30px; border: none;
            border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 20px;
        }
        button:hover { background-color: var(--tecno-light-blue); }
        
        /* Layout Report Rigido per PDF A4 Orizzontale */
        #reportSection { display: none; }
        #printableReport { background: white; }
        
        .norm-box { 
            display: inline-block; width: 47%; box-sizing: border-box; 
            vertical-align: top; margin-right: 2%; margin-bottom: 15px;
            padding: 15px; border-radius: 8px;
        }
        
        .norm-active { background-color: var(--active-norm); border-left: 5px solid var(--active-border); }
        .norm-upcoming { background-color: var(--upcoming-norm); border-left: 5px solid var(--upcoming-border); }
        .norm-date { font-size: 13px; color: #555; margin-top: 5px; font-style: italic; }
        
        .page-break { page-break-before: always; clear: both; padding-top: 20px; margin-top: 20px; border-top: 1px dashed #ccc; }
        
        .chart-container { position: relative; height: 450px; width: 100%; margin-top: 20px; background: white; }
    </style>
</head>
<body>

<div class="header-logo">
    <img src="Logo.Tecno-ESG.jpg" alt="Tecno Group Logo" id="mainLogo">
</div>

<div class="container" id="appContainer">
    <div id="inputSection">
        <h1>SustainLEX.AI</h1>
        <p>Valutazione preliminare di compliance alle normative europee sulla sostenibilità ambientale e sociale.</p>

        <div class="section">
            <h2>1. Anagrafica Aziendale</h2>
            <div class="form-group"><label>Nome azienda</label><input type="text" id="companyName"></div>
            <div class="form-group"><label>P.Iva</label><input type="text" id="vat"></div>
            <div class="form-group"><label>Indirizzo sito web (Analisi Greenwashing / Supply Chain)</label><input type="text" id="website"></div>
            <div class="form-group"><label>Indirizzo sede legale</label><input type="text" id="address"></div>
            <div class="form-group"><label>Paese sede legale</label><input type="text" id="country" value="Italia"></div>
            
            <div class="form-group">
                <label>Settore (Selezione multipla - tieni premuto Ctrl/Cmd)</label>
                <select id="sector" multiple size="6">
                    <option value="Agricoli e alimentari">Prodotti agricoli e alimentari</option>
                    <option value="Chimici">Prodotti chimici</option>
                    <option value="Plastiche e gomma">Materie plastiche e gomma</option>
                    <option value="Tessili">Prodotti tessili</option>
                    <option value="Metalli">Metalli e prodotti metallici</option>
                    <option value="Macchinari">Macchinari e apparecchiature</option>
                    <option value="Minerali e combustibili">Minerali e combustibili</option>
                    <option value="Legno">Legno e prodotti in legno</option>
                    <option value="Pelle e calzature">Articoli in pelle e calzature</option>
                    <option value="Costruzione">Prodotti minerali e materiali da costruzione</option>
                    <option value="Farmaceutici">Prodotti farmaceutici</option>
                    <option value="Cosmetici">Prodotti cosmetici</option>
                    <option value="Veicoli">Veicoli e mezzi di trasporto</option>
                    <option value="Elettronica">Apparecchiature elettroniche ed elettrodomestici</option>
                    <option value="Carta">Prodotti dell'industria cartaria</option>
                    <option value="Servizi">Servizi</option>
                    <option value="Altro">Altro da specificare</option>
                </select>
            </div>
            <div class="form-group"><label>Numero dipendenti</label><input type="number" id="employees"></div>
            <div class="form-group"><label>Fatturato Annuale (€)</label><input type="number" id="revenue"></div>
            <div class="form-group"><label>Stato Patrimoniale (€)</label><input type="number" id="assets"></div>
            <div class="form-group">
                <label>La società è quotata in UE?</label>
                <select id="listed">
                    <option value="Regolamentato">Sì, nel mercato regolamentato</option>
                    <option value="Non Regolamentato">Sì, nel mercato non regolamentato</option>
                    <option value="No" selected>No</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h2>2. Questionario Operativo</h2>
            
            <div class="form-group">
                <label>1. L'azienda redige un report di sostenibilità?</label>
                <select id="q1" onchange="toggleConditional('q1', 'q1_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q1_sub" class="conditional-select"><option value="">Specificare...</option><option value="GRI">Report GRI</option><option value="ESRS">Report ESRS</option><option value="Altro">Altro (es: VSME)</option></select>
            </div>

            <div class="form-group">
                <label>2. Tra i clienti dell'azienda ci sono grandi aziende o multinazionali?</label>
                <select id="q2" onchange="toggleConditional('q2', 'q2_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q2_sub" class="conditional-select"><option value="">Specificare...</option><option value="Collaborazione">Collabora pienamente ai processi di due diligence di tali clienti</option><option value="Fornitura Dati">Fornisce a tali clienti molti e diversi dati in materia</option><option value="Nessuna Richiesta">I clienti non richiedono dati al momento</option></select>
            </div>

            <div class="form-group">
                <label>3. L'azienda verifica l'assenza di lavoro forzato e/o minorile nella filiera?</label>
                <select id="q3" onchange="toggleConditional('q3', 'q3_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q3_sub" class="conditional-select"><option value="">Specificare...</option><option value="Strutturato">Ha strutturato un sistema di due diligence per verificare questi aspetti</option><option value="Richiesta">Richiede ai propri fornitori alcune informazioni per verificare</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>4. L'azienda commercializza prodotti derivanti da bovini, cacao, caffè, olio di palma, gomma, soia o legno?</label>
                <select id="q4" onchange="toggleConditional('q4', 'q4_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q4_sub" class="conditional-select"><option value="">Specificare...</option><option value="DD Attiva">Effettua due diligence con focus su deforestazione e degrado forestale</option><option value="DD Inizio">Ha iniziato a impostare un sistema di due diligence</option><option value="Solo Norme">Conosce le norme sulla deforestazione ma non ha ancora attivato nessuna iniziativa</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>5. L'azienda importa e o esporta prodotti derivanti da bovini, cacao, caffè, olio di palma, gomma, soia e legno?</label>
                <select id="q5" onchange="toggleConditional('q5', 'q5_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q5_sub" class="conditional-select"><option value="">Specificare...</option><option value="DD Attiva">Effettua due diligence su deforestazione e degrado forestale</option><option value="DD Inizio">Ha iniziato a impostare un sistema di due diligence</option><option value="Solo Norme">Conosce le norme sulla deforestazione ma non ha ancora attivato nessuna iniziativa</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>6. L'azienda importa in UE beni come stagno, tantalio, tungsteno, minerali, oro, da zone di conflitto?</label>
                <select id="q6" onchange="toggleConditional('q6', 'q6_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q6_sub" class="conditional-select"><option value="">Specificare...</option><option value="Strutturato">Ha strutturato un sistema di due diligence per verificare questi aspetti</option><option value="Richiesta">Richiede ai propri fornitori alcune informazioni per verificare</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>7. L'azienda importa da Paesi extraUE: cemento, fertilizzanti, ferro/acciaio, alluminio, elettricità, idrogeno?</label>
                <select id="q7" onchange="toggleConditional('q7', 'q7_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q7_sub" class="conditional-select"><option value="">Specificare...</option><option value="Dichiarazione">Presenta dichiarazione emissioni e acquista certificati compensazione</option><option value="Monitoraggio">Monitora e rende conto dei dati sulle emissioni</option><option value="Solo Norme">Conosce adempimenti ma non ha processi di gestione</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>8. L'azienda immette sul mercato veicoli (agricoli/forestali, 2/3 ruote, quadricicli, cat. M/N/O)?</label>
                <select id="q8" onchange="toggleConditional('q8', 'q8_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q8_sub" class="conditional-select"><option value="">Specificare...</option><option value="Esclusivamente">Immette ESCLUSIVAMENTE veicoli presenti in questo elenco</option><option value="Anche Altri">Immette anche veicoli NON presenti in questo elenco</option></select>
            </div>

            <div class="form-group"><label>9. L'azienda applica principi di ecoprogettazione?</label><select id="q9"><option value="NO">No</option><option value="SI">Sì</option></select></div>
            
            <div class="form-group"><label>10. L'azienda immette sul mercato elettrodomestici (lavatrici, ecc), display, server, telefoni?</label><select id="q10"><option value="NO">No</option><option value="SI">Sì</option></select></div>

            <div class="form-group">
                <label>11. L'azienda produce, importa o immette sul mercato prodotti contenenti microplastiche?</label>
                <select id="q11" onchange="toggleConditional('q11', 'q11_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q11_sub" class="conditional-select"><option value="">Specificare...</option><option value="Regolari">Conduce regolarmente studi sul tema microplastiche</option><option value="Sporadici">Ha condotto in modo sporadico studi</option><option value="Legge">Si limita ad applicare i requisiti di legge</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>12. L'azienda produce, importa, distribuisce o utilizza imballaggi?</label>
                <select id="q12" onchange="toggleConditional('q12', 'q12_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q12_sub" class="conditional-select"><option value="">Specificare...</option><option value="Implementa">Conosce le nuove normative e ha già iniziato a implementare requisiti</option><option value="Conosce">Conosce le normative ma non ha implementato attività</option><option value="Poche Info">Ha poche o nessuna informazione in merito</option></select>
            </div>

            <div class="form-group">
                <label>13. L'azienda utilizza pratiche di marketing sull'impatto ambientale (Green Claims)?</label>
                <select id="q13" onchange="toggleConditional('q13', 'q13_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q13_sub" class="conditional-select"><option value="">Specificare...</option><option value="Misure">Conosce norme/rischi e ha adottato misure anti-sanzioni</option><option value="No Misure">Conosce norme/rischi ma non ha misure specifiche</option><option value="Rischi Gen">Conosce i rischi generali sul greenwashing</option><option value="Non Conosce">Non conosce le norme</option></select>
            </div>

            <div class="form-group">
                <label>14. L'azienda immette sul mercato prodotti che includono o prevedono l'uso di batterie?</label>
                <select id="q14" onchange="toggleConditional('q14', 'q14_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q14_sub" class="conditional-select"><option value="">Specificare...</option><option value="Implementate">A conoscenza degli obblighi e ha già implementato le richieste</option><option value="A Conoscenza">A conoscenza dei requisiti e degli obblighi previsti</option><option value="Non Conoscenza">NON è a conoscenza dei requisiti</option></select>
            </div>

            <div class="form-group">
                <label>15. L'azienda acquista materie prime definite dall'UE come critiche o strategiche?</label>
                <select id="q15" onchange="toggleConditional('q15', 'q15_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q15_sub" class="conditional-select"><option value="">Specificare...</option><option value="Solo Riciclate">Acquista solo MPC riciclate</option><option value="Alcune Riciclate">Alcune MPC che acquista sono riciclate</option><option value="Solo Vergini">Acquista solo MPC vergini</option></select>
            </div>

            <div class="form-group">
                <label>16. L'azienda applica i principi della trasparenza e parità retributiva tra uomini e donne?</label>
                <select id="q16" onchange="toggleConditional('q16', 'q16_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q16_sub" class="conditional-select"><option value="">Specificare...</option><option value="Certificazione">Ha implementato sistemi di gestione e certificazione sul tema</option><option value="Monitora">Monitora il tema ma non ha sistemi/certificazioni</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>17. L'azienda mette in atto iniziative di responsabilità d'impresa in ambito sociale?</label>
                <select id="q17" onchange="toggleConditional('q17', 'q17_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q17_sub" class="conditional-select"><option value="">Specificare...</option><option value="Certificazione">Ha implementato sistemi di gestione e certificazioni</option><option value="Monitora">Monitora il tema, ma non ha sistemi o certificazioni</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>18. L'azienda mette in atto iniziative di responsabilità in ambito ambientale?</label>
                <select id="q18" onchange="toggleConditional('q18', 'q18_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q18_sub" class="conditional-select"><option value="">Specificare...</option><option value="Certificazione">Ha implementato sistemi di gestione e certificazioni</option><option value="Monitora">Monitora il tema, ma non ha sistemi o certificazioni</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <div class="form-group">
                <label>19. L'azienda mette in atto iniziative di responsabilità d'impresa in ambito salute e sicurezza?</label>
                <select id="q19" onchange="toggleConditional('q19', 'q19_sub', 'SI')"><option value="NO">No</option><option value="SI">Sì</option></select>
                <select id="q19_sub" class="conditional-select"><option value="">Specificare...</option><option value="Certificazione">Ha implementato sistemi di gestione e certificazioni</option><option value="Monitora">Monitora il tema, ma non ha sistemi o certificazioni</option><option value="Nessuna">Nessuna delle precedenti</option></select>
            </div>

            <button onclick="generateReport()">Elabora Report Strategico</button>
        </div>
    </div>

    <div id="reportSection">
        <div id="printableReport">
            
            <div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <img id="pdfLogo1" src="Logo.Tecno-ESG.jpg" alt="Tecno
